<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VendorDB Fiche</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EE;
    --surface: #FFFFFF;
    --border: #E0DDD6;
    --accent: #1A1A2E;
    --accent2: #4A4E8C;
    --muted: #8A8880;
    --text: #1C1C1C;
    --tag-bg: #EEEDF8;
    --tag-text: #3C3489;
    --active-bg: #EAF5EE;
    --active-text: #2A6B3C;
    --inactive-bg: #F5EEEE;
    --inactive-text: #8B3A3A;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--accent);
    color: white;
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header .left { display: flex; align-items: center; gap: 16px; }

  .logo {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.4;
    padding-right: 16px;
    border-right: 1px solid rgba(255,255,255,0.12);
  }

  header h1 { font-size: 14px; font-weight: 500; }

  .sync-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.35);
  }

  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #aaa; flex-shrink: 0; }
  .sync-dot.loading { background: #f0c040; animation: pulse 1s infinite; }
  .sync-dot.ok  { background: #5cb87a; }
  .sync-dot.err { background: #e05555; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* MAIN */
  .main { max-width: 860px; margin: 0 auto; padding: 32px 24px 80px; }

  /* LOADER */
  .loader {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 32px; gap: 16px; color: var(--muted);
  }
  .spinner {
    width: 26px; height: 26px;
    border: 2px solid var(--border);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader p { font-size: 13px; }

  /* ERROR */
  .err-state {
    background: var(--surface); border: 1.5px solid var(--inactive-bg);
    border-radius: 10px; padding: 32px; text-align: center; display: none;
  }
  .err-state h2 { font-size: 15px; font-weight: 500; margin-bottom: 8px; color: var(--inactive-text); }
  .err-state p  { font-size: 12px; color: var(--muted); line-height: 1.7; }

  /* SEARCH */
  .search-section { display: none; margin-bottom: 20px; }
  .search-section.visible { display: block; animation: fadeUp 0.2s ease; }

  .search-meta {
    display: flex; align-items: baseline;
    justify-content: space-between; margin-bottom: 10px;
  }

  .search-label {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  }

  .vendor-count { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  .search-wrap { position: relative; }

  .search-wrap svg {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%); color: var(--muted); pointer-events: none;
  }

  #zoek {
    width: 100%; padding: 13px 13px 13px 44px;
    font-family: var(--sans); font-size: 15px;
    border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--surface); color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  #zoek:focus { border-color: var(--accent2); }
  #zoek::placeholder { color: var(--muted); }

  .results-list {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 8px; margin-top: 6px; overflow: hidden; display: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .results-list.open { display: block; }

  .result-item {
    padding: 11px 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); transition: background 0.1s;
    gap: 12px;
  }
  .result-item:last-child { border-bottom: none; }
  .result-item:hover, .result-item.sel { background: var(--tag-bg); }

  .result-left { display: flex; flex-direction: column; gap: 2px; }
  .result-name { font-weight: 500; font-size: 14px; }
  .result-sub  { font-size: 11px; color: var(--muted); }
  .result-right { display: flex; gap: 6px; flex-shrink: 0; }

  .result-tag {
    font-size: 10px; font-family: var(--mono);
    padding: 2px 8px; border-radius: 999px;
    background: var(--tag-bg); color: var(--tag-text);
    white-space: nowrap;
  }

  .no-results { padding: 14px 16px; color: var(--muted); font-size: 13px; }

  /* FICHE */
  .fiche { display: none; margin-top: 8px; }
  .fiche.visible { display: block; animation: fadeUp 0.25s ease; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  /* Fiche header */
  .fiche-header {
    background: var(--accent);
    border-radius: 10px 10px 0 0;
    padding: 24px 28px;
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 16px;
  }

  .fh-left { flex: 1; min-width: 0; }
  .vendor-eyebrow { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 5px; }
  .vendor-name { font-size: 22px; font-weight: 600; color: white; letter-spacing: -0.01em; margin-bottom: 4px; }

  .fh-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

  .fh-tag {
    font-size: 11px; font-family: var(--mono);
    padding: 3px 10px; border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
  }

  .fh-tag.status-actief   { background: var(--active-bg);  color: var(--active-text);   border-color: transparent; }
  .fh-tag.status-inactief { background: var(--inactive-bg); color: var(--inactive-text); border-color: transparent; }

  /* Sections */
  .fiche-body {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
  }

  .section-header {
    padding: 8px 20px 7px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }

  .section-header:first-child { border-top: none; }

  .section-label {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted);
  }

  /* Field rows */
  .field-row {
    display: grid;
    grid-template-columns: 180px 1fr auto;
    align-items: center;
    padding: 11px 20px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background 0.1s;
  }
  .field-row:last-child { border-bottom: none; }
  .field-row:hover { background: #FAFAF8; }

  .field-key { font-size: 12px; color: var(--muted); font-weight: 400; }

  .field-val { font-size: 13px; color: var(--text); font-weight: 500; word-break: break-word; }
  .field-val.mono { font-family: var(--mono); font-size: 12px; font-weight: 400; letter-spacing: 0.02em; }
  .field-val.empty { color: var(--muted); font-weight: 400; }
  .field-val a { color: var(--accent2); text-decoration: none; }
  .field-val a:hover { text-decoration: underline; }

  .bool-yes { color: var(--active-text); font-family: var(--mono); font-size: 12px; }
  .bool-no  { color: var(--muted);       font-family: var(--mono); font-size: 12px; }

  /* Copy button */
  .copy-btn {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 9px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 10px; font-family: var(--mono);
    color: var(--muted); cursor: pointer;
    transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .copy-btn:hover { border-color: var(--accent2); color: var(--accent2); background: var(--tag-bg); }
  .copy-btn.copied { border-color: var(--active-text); color: var(--active-text); background: var(--active-bg); }

  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    .main  { padding: 20px 12px 60px; }
    .field-row { grid-template-columns: 130px 1fr auto; }
    .fiche-header { padding: 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="left">
    <span class="logo">VendorDB</span>
    <h1>Leveranciersfiche</h1>
  </div>
  <div class="sync-status">
    <div class="sync-dot loading" id="syncDot"></div>
    <span id="syncLabel">laden…</span>
  </div>
</header>

<div class="main">

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Vendordata ophalen…</p>
  </div>

  <div class="err-state" id="errState">
    <h2>Kon data niet ophalen</h2>
    <p>Controleer of de Google Sheet gepubliceerd is op internet.<br>(Bestand → Delen → Publiceren op internet → CSV)</p>
  </div>

  <div class="search-section" id="searchSection">
    <div class="search-meta">
      <span class="search-label">Zoek vendor</span>
      <span class="vendor-count" id="vendorCount"></span>
    </div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="zoek" placeholder="Typ bedrijfsnaam…" autocomplete="off" />
    </div>
    <div class="results-list" id="resultsList"></div>
  </div>

  <div class="fiche" id="fiche">
    <div id="ficheWrap"></div>
  </div>

</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQYxFJ-AZ6u8FZaGNTV-OFbXZj_OQL2GH8BYXiwSQ6w4euTnmMIiPS-i9w7wlqESnqtHVSYfrdl1_1r/pub?gid=712742950&single=true&output=csv';

// ── SECTIE DEFINITIES ──────────────────────────────────────────────────────
// Volgorde bepaalt weergave. Regex matcht op kolomnaam (case-insensitive).
// Nieuwe kolommen die nergens matchen → automatisch in "Overige".
const SECTIONS = [
  {
    label: 'Contact',
    match: /primary.contact|contact.email|order.email|support.email|escalation/i
  },
  {
    label: 'Commercieel',
    match: /agreement|ordering.method|discount|payment.term|pricing.freedom|auto.renewal|termination|deal.reg|nfr|sub.reseller|price.change|margin|erp.code|invoicing|business.case|pricing.model/i
  },
  {
    label: 'Compliance & Security',
    match: /gdpr|soc.?2|iso.?27001|data.residency|eu.ai.act|cra|trust.center|dpa|privacy.policy/i
  },
  {
    label: 'Product & Technologie',
    match: /platform|deployment|sso|mfa|sku|license.type|user.type|user.group|os.support/i
  },
  {
    label: 'Partnership & Verlenging',
    match: /renewal|price.at.renewal|next.review|partnership|website|partner.portal/i
  },
];

// Kolommen die in de header getoond worden (niet als field row)
const HEADER_KEYS = /^vendor$|^status$|^category$|^country$|^vendor.type$/i;

// Zoekkolom
const NAME_KEY = 'Vendor';

let vendors = [];
let headers = [];
let selectedIndex = -1;

// ── LADEN ─────────────────────────────────────────────────────────────────
async function laadData() {
  setSync('loading', 'laden…');
  show('loader'); hide('errState');
  document.getElementById('searchSection').classList.remove('visible');
  document.getElementById('fiche').classList.remove('visible');

  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    parseCSV(text);
    hide('loader');
    document.getElementById('searchSection').classList.add('visible');
    document.getElementById('vendorCount').textContent = vendors.length + ' vendors';
    setSync('ok', 'gesynchroniseerd');
    document.getElementById('zoek').focus();
  } catch(e) {
    hide('loader');
    show('errState');
    setSync('err', 'fout bij laden');
  }
}

function show(id) { document.getElementById(id).style.display = ''; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

function setSync(state, label) {
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncLabel').textContent = label;
}

function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  // Auto-detect separator
  const firstLine = lines[0];
  const sep = (firstLine.split(';').length > firstLine.split(',').length) ? ';' : ',';
  headers = firstLine.split(sep).map(h => h.trim().replace(/\r/g, ''));
  vendors = lines.slice(1).map(line => {
    // Handle quoted CSV values
    const vals = parseCSVLine(line, sep);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').trim().replace(/\r/g, ''));
    return obj;
  }).filter(v => v[NAME_KEY] && v[NAME_KEY].trim());
}

function parseCSVLine(line, sep) {
  const result = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQuote = !inQuote; }
    else if (c === sep && !inQuote) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

// ── ZOEKEN ────────────────────────────────────────────────────────────────
const zoekEl  = document.getElementById('zoek');
const lijstEl = document.getElementById('resultsList');

zoekEl.addEventListener('input', () => {
  const q = zoekEl.value.trim().toLowerCase();
  selectedIndex = -1;
  if (!q) { lijstEl.classList.remove('open'); return; }

  const hits = vendors.filter(v => (v[NAME_KEY] || '').toLowerCase().includes(q));

  if (!hits.length) {
    lijstEl.innerHTML = '<div class="no-results">Geen vendors gevonden</div>';
    lijstEl.classList.add('open');
    return;
  }

  lijstEl.innerHTML = hits.slice(0, 15).map(v => {
    const status = v['Status'] || '';
    const cat    = v['Category'] || '';
    const country= v['Country'] || '';
    return `
      <div class="result-item" data-vendor="${esc(v[NAME_KEY])}">
        <div class="result-left">
          <span class="result-name">${hl(v[NAME_KEY], q)}</span>
          <span class="result-sub">${[cat, country].filter(Boolean).join(' · ')}</span>
        </div>
        <div class="result-right">
          ${status ? `<span class="result-tag">${status}</span>` : ''}
        </div>
      </div>`;
  }).join('');

  lijstEl.querySelectorAll('.result-item').forEach(el => {
    el.addEventListener('click', () => kiesVendor(el.dataset.vendor));
  });

  lijstEl.classList.add('open');
});

zoekEl.addEventListener('keydown', e => {
  const items = lijstEl.querySelectorAll('.result-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown')  { e.preventDefault(); selectedIndex = Math.min(selectedIndex + 1, items.length - 1); updSel(items); }
  else if (e.key === 'ArrowUp')   { e.preventDefault(); selectedIndex = Math.max(selectedIndex - 1, 0); updSel(items); }
  else if (e.key === 'Enter' && selectedIndex >= 0) items[selectedIndex].click();
  else if (e.key === 'Escape') lijstEl.classList.remove('open');
});

document.addEventListener('click', e => {
  if (!e.target.closest('#zoek') && !e.target.closest('#resultsList')) lijstEl.classList.remove('open');
});

function updSel(items) { items.forEach((el, i) => el.classList.toggle('sel', i === selectedIndex)); }
function hl(text, q) {
  const idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return text;
  return text.slice(0, idx) + '<strong>' + text.slice(idx, idx + q.length) + '</strong>' + text.slice(idx + q.length);
}
function esc(s) { return (s || '').replace(/"/g, '&quot;'); }

// ── VENDOR KIEZEN ─────────────────────────────────────────────────────────
function kiesVendor(name) {
  const v = vendors.find(x => x[NAME_KEY] === name);
  if (!v) return;
  lijstEl.classList.remove('open');
  zoekEl.value = '';
  toonFiche(v);
  document.getElementById('fiche').classList.add('visible');
  document.getElementById('fiche').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── FICHE RENDEREN ────────────────────────────────────────────────────────
function toonFiche(v) {
  const status  = v['Status']   || '';
  const cat     = v['Category'] || '';
  const country = v['Country']  || '';
  const type    = v['Vendor Type'] || '';

  // Header tags
  const statusClass = status.toLowerCase() === 'actief' ? 'status-actief'
                    : status.toLowerCase() === 'inactief' ? 'status-inactief' : '';
  const headerTags = [
    status  ? `<span class="fh-tag ${statusClass}">${status}</span>` : '',
    cat     ? `<span class="fh-tag">${cat}</span>` : '',
    country ? `<span class="fh-tag">${country}</span>` : '',
    type    ? `<span class="fh-tag">${type}</span>` : '',
  ].filter(Boolean).join('');

  // Bepaal welke kolommen in de header zitten (niet als rij tonen)
  const headerCols = new Set(headers.filter(h => HEADER_KEYS.test(h)));

  // Wijs elke kolom toe aan een sectie
  const sectionBuckets = SECTIONS.map(s => ({ label: s.label, keys: [] }));
  const overige = { label: 'Overige', keys: [] };

  headers.forEach(h => {
    if (h === NAME_KEY || headerCols.has(h)) return; // al in header
    const idx = SECTIONS.findIndex(s => s.match.test(h));
    if (idx >= 0) sectionBuckets[idx].keys.push(h);
    else overige.keys.push(h);
  });

  // Render alle secties
  const allSections = [...sectionBuckets, overige].filter(s => s.keys.length > 0);
  const sectionsHTML = allSections.map(s => renderSection(s.label, s.keys, v)).join('');

  document.getElementById('ficheWrap').innerHTML = `
    <div class="fiche-header">
      <div class="fh-left">
        <div class="vendor-eyebrow">vendor</div>
        <div class="vendor-name">${v[NAME_KEY] || '—'}</div>
        <div class="fh-tags">${headerTags}</div>
      </div>
    </div>
    <div class="fiche-body">${sectionsHTML}</div>
  `;
}

function renderSection(label, keys, v) {
  const rows = keys.map(k => renderRow(k, v[k])).join('');
  return `
    <div class="section-header"><span class="section-label">${label}</span></div>
    ${rows}
  `;
}

function renderRow(key, rawVal) {
  const val = (rawVal || '').trim();
  const isEmpty = !val;
  let displayHTML = '';

  if (isEmpty) {
    displayHTML = `<span class="field-val empty">—</span>`;
  } else if (isURL(val)) {
    const short = val.replace(/^https?:\/\/(www\.)?/, '').replace(/\/$/, '');
    displayHTML = `<span class="field-val"><a href="${val}" target="_blank" rel="noopener">${short}</a></span>`;
  } else if (isEmail(key)) {
    displayHTML = `<span class="field-val"><a href="mailto:${val}">${val}</a></span>`;
  } else if (isBoolean(val)) {
    const yes = /^(yes|ja|true|✓|x)$/i.test(val);
    displayHTML = `<span class="field-val ${yes ? 'bool-yes' : 'bool-no'}">${yes ? '✓ ' + val : '✗ ' + val}</span>`;
  } else if (isMonoField(key)) {
    displayHTML = `<span class="field-val mono">${val}</span>`;
  } else {
    displayHTML = `<span class="field-val">${val}</span>`;
  }

  const copyable = !isEmpty && !isURL(val);
  const copyBtn = copyable
    ? `<button class="copy-btn" onclick="kopieer(this,${JSON.stringify(val)})">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        kopieer</button>`
    : `<span></span>`;

  return `
    <div class="field-row">
      <span class="field-key">${key}</span>
      ${displayHTML}
      ${copyBtn}
    </div>`;
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function isURL(v)         { return /^https?:\/\//i.test(v); }
function isEmail(key)     { return /email|mail/i.test(key); }
function isBoolean(v)     { return /^(yes|no|ja|nee|true|false|✓|✗|x)$/i.test(v); }
function isMonoField(key) { return /erp.code|iban|discount|margin|sku/i.test(key); }

// ── COPY ──────────────────────────────────────────────────────────────────
function kopieer(btn, val) {
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 12 4 10"/></svg> gekopieerd`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> kopieer`;
    }, 2000);
  });
}
